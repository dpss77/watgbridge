name: Sync with Upstream

# Runs every day at 07:00 UTC.
# If akshettrj/watgbridge published a new release since your last sync,
# this workflow opens a Pull Request on your fork automatically.
# You review it, merge it, and the docker-publish workflow fires immediately.
on:
  schedule:
    - cron: "0 7 * * *"     # daily at 07:00 UTC
  workflow_dispatch:          # also triggerable manually

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # needed to push the sync branch
      pull-requests: write    # needed to open the PR

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history needed for the merge

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/akshettrj/watgbridge.git

      - name: Fetch upstream tags and branches
        run: git fetch upstream --tags

      - name: Get latest upstream release tag
        id: upstream
        run: |
          LATEST=$(git ls-remote --tags upstream | \
                   grep -oP 'refs/tags/v\K[0-9]+\.[0-9]+\.[0-9]+' | \
                   sort -V | tail -1)
          echo "Latest upstream version: v$LATEST"
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Get current fork version
        id: current
        run: |
          # Read from a VERSION file if present, otherwise fall back to latest local tag
          if [ -f VERSION ]; then
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          else
            LOCAL=$(git tag --sort=-v:refname | grep -oP '^v\K[0-9]+\.[0-9]+\.[0-9]+' | head -1 || echo "0.0.0")
            echo "version=$LOCAL" >> $GITHUB_OUTPUT
          fi

      - name: Check if sync is needed
        id: check
        run: |
          UPSTREAM="${{ steps.upstream.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          echo "Upstream: $UPSTREAM  |  Current: $CURRENT"
          if [ "$UPSTREAM" != "$CURRENT" ]; then
            echo "needed=true"  >> $GITHUB_OUTPUT
            echo "branch=sync/upstream-v$UPSTREAM" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "No sync needed — already on v$UPSTREAM"
          fi

      - name: Create sync branch and merge upstream
        if: steps.check.outputs.needed == 'true'
        env:
          BRANCH: ${{ steps.check.outputs.branch }}
          VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          git checkout -b "$BRANCH"
          git merge "v$VERSION" --no-edit --allow-unrelated-histories || true
          echo "$VERSION" > VERSION
          git add VERSION
          git commit -m "chore: sync upstream v$VERSION" --allow-empty
          git push origin "$BRANCH"

      - name: Open Pull Request
        if: steps.check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.check.outputs.branch }}
          base: main
          title: "⬆ Sync upstream watgbridge v${{ steps.upstream.outputs.version }}"
          body: |
            Automated sync from [akshettrj/watgbridge](https://github.com/akshettrj/watgbridge).

            **Upstream version:** v${{ steps.upstream.outputs.version }}
            **Your current version:** v${{ steps.current.outputs.version }}

            ### What to do
            1. Review the changes in the **Files changed** tab
            2. Merge this PR
            3. The `docker-publish` workflow will automatically rebuild and push a new image to GHCR

            ---
            *Generated by the daily upstream-sync workflow.*
          labels: upstream-sync, automated
