name: Build & Publish Docker Image

# Triggers:
#   • every push to main  (continuous delivery)
#   • every GitHub Release (tagged version)
#   • manual button in GitHub Actions UI
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write         # needed to push to ghcr.io

    steps:
      # ── 1. Checkout your fork ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (enables ARM64 emulation on GitHub's AMD64 runners) ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx (multi-arch builder) ───────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Login to GitHub Container Registry ──────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}    # auto-provided, no setup needed

      # ── 5. Generate smart tags ─────────────────────────────────
      #   On a release tag like v1.13.2 this produces:
      #     ghcr.io/YOU/watgbridge:latest
      #     ghcr.io/YOU/watgbridge:1.13.2
      #     ghcr.io/YOU/watgbridge:1.13
      #     ghcr.io/YOU/watgbridge:1
      #   On a plain push to main it produces:
      #     ghcr.io/YOU/watgbridge:main
      #     ghcr.io/YOU/watgbridge:sha-abc1234   (short commit SHA for traceability)
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/watgbridge
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 6. Build and push (multi-arch: AMD64 + ARM64) ──────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64     # arm64 = Apple Silicon native
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — first build is slow, every subsequent one is fast
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Print the final image digest for audit log ──────────
      - name: Print image digest
        run: echo "Image digest → ${{ steps.build-push.outputs.digest }}"
